<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlinhaPro — Sala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="header__logo">Alinha<span>Pro</span></a>
    <div class="header__sala-info">
      <span id="salaNome">Carregando...</span>
      <span class="header__status" id="salaStatus">Ao vivo</span>
    </div>
  </header>

  <div class="sala-container">
    <!-- DOCUMENTO -->
    <div class="sala-documento">
      <div class="doc-header">
        <div class="doc-header__title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Documento do Projeto
        </div>
        <div>
          <button class="btn btn--sm btn--primary" id="btnEditar" style="display:none;">Editar</button>
          <button class="btn btn--sm btn--primary" id="btnSalvar" style="display:none;">Salvar</button>
          <button class="btn btn--sm btn--secondary" id="btnCancelar" style="display:none;">Cancelar</button>
        </div>
      </div>

      <div class="doc-content" id="docContent">
        <div class="empty-state">
          <div class="empty-state__icon">&#128196;</div>
          <p>Carregando documento...</p>
        </div>
      </div>

      <div class="doc-editor" id="docEditor">
        <textarea id="editorTextarea" placeholder="Escreva em Markdown..."></textarea>
      </div>
    </div>

    <!-- CHAT -->
    <div class="sala-chat">
      <div class="chat-header">
        <div class="chat-header__title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Chat
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="empty-state">
          <p class="text-sm text-muted">Nenhuma mensagem ainda. Comece a conversa!</p>
        </div>
      </div>

      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')enviarMsg()">
        <button onclick="enviarMsg()">Enviar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/salas.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/documento.js"></script>
  <script>
    let salaAtual = null;
    let meuNome = localStorage.getItem('alinhapro_nome') || 'Visitante';
    let isAdmin = false;

    async function init() {
      const salaId = getParam('id');
      const adminKey = getParam('admin');

      if (!salaId) {
        window.location.href = 'index.html';
        return;
      }

      salaAtual = await buscarSala(salaId);
      if (!salaAtual) {
        showToast('Sala não encontrada');
        setTimeout(() => window.location.href = 'index.html', 1500);
        return;
      }

      isAdmin = adminKey === salaAtual.senha_admin;
      if (isAdmin) {
        meuNome = localStorage.getItem('alinhapro_admin_nome') || 'Consultor';
        localStorage.setItem('alinhapro_nome', meuNome);
      }

      document.getElementById('salaNome').textContent = salaAtual.nome;
      document.title = `AlinhaPro — ${salaAtual.nome}`;

      window.__docAtual = salaAtual.documento;
      document.getElementById('docContent').innerHTML = renderizarMarkdown(salaAtual.documento);

      if (isAdmin) {
        document.getElementById('btnEditar').style.display = '';
      }

      iniciarEditor(salaId, isAdmin);

      const msgs = await carregarMensagens(salaId);
      const container = document.getElementById('chatMessages');
      if (msgs.length > 0) {
        container.innerHTML = '';
        msgs.forEach(m => container.appendChild(renderMensagem(m, meuNome)));
        scrollChatParaBaixo();
      }

      ouvirMensagens(salaId, (novaMensagem) => {
        const container = document.getElementById('chatMessages');
        const emptyState = container.querySelector('.empty-state');
        if (emptyState) emptyState.remove();
        container.appendChild(renderMensagem(novaMensagem, meuNome));
        scrollChatParaBaixo();
      });

      ouvirMudancasDocumento(salaId, (novoDoc) => {
        atualizarVisualizacao(novoDoc);
      });
    }

    async function enviarMsg() {
      const input = document.getElementById('chatInput');
      const texto = input.value.trim();
      if (!texto) return;

      input.value = '';
      await enviarMensagem(salaAtual.id, meuNome, texto);
    }

    const btnEditar = document.getElementById('btnEditar');
    const btnSalvar = document.getElementById('btnSalvar');
    const btnCancelar = document.getElementById('btnCancelar');

    btnEditar.addEventListener('click', () => {
      btnEditar.style.display = 'none';
      btnSalvar.style.display = '';
      btnCancelar.style.display = '';
    });

    btnCancelar.addEventListener('click', () => {
      btnEditar.style.display = '';
      btnSalvar.style.display = 'none';
      btnCancelar.style.display = 'none';
    });

    btnSalvar.addEventListener('click', () => {
      btnEditar.style.display = '';
      btnSalvar.style.display = 'none';
      btnCancelar.style.display = 'none';
    });

    init();
  </script>

</body>
</html>
