<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlinhaPro — Sala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header header--sala" role="banner">
    <a href="index.html" class="header__logo" title="Ir para início">Alinha<span>Pro</span></a>
    <div class="header__sala-info">
      <span id="salaNome" class="header__sala-title">Carregando…</span>
      <span class="header__status" id="salaStatus" aria-live="polite">Ao vivo</span>
    </div>
    <nav class="header__nav" id="navSala" aria-label="Ações da sala">
      <a href="admin.html" class="header__nav-link header__nav-link--muted" id="navPainel" hidden title="Gerenciar salas e criar novas">Painel</a>
      <button type="button" class="header__nav-link header__nav-link--btn header__nav-link--muted" id="navSairConsultor" hidden title="Remove a sessão de edição neste navegador">
        Sair do modo consultor
      </button>
      <span class="header__nav-sep" id="navSepConsultor" hidden aria-hidden="true"></span>
      <a href="index.html" class="header__nav-link header__nav-link--cta" id="navSairSala" title="Voltar para entrar em outra sala">Sair da sala</a>
    </nav>
  </header>

  <div class="sala-container">
    <div class="sala-documento">
      <div class="doc-header">
        <div class="doc-header__title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Documento do Projeto
        </div>
        <div>
          <button class="btn btn--sm btn--primary" id="btnEditar" style="display:none;">Editar</button>
          <button class="btn btn--sm btn--primary" id="btnSalvar" style="display:none;">Salvar</button>
          <button class="btn btn--sm btn--secondary" id="btnCancelar" style="display:none;">Cancelar</button>
        </div>
      </div>

      <div class="doc-content" id="docContent">
        <div class="empty-state">
          <div class="empty-state__icon">&#128196;</div>
          <p>Carregando documento...</p>
        </div>
      </div>

      <div class="doc-editor" id="docEditor">
        <textarea id="editorTextarea" placeholder="Escreva em Markdown..."></textarea>
      </div>
    </div>

    <div class="sala-chat">
      <div class="chat-header">
        <div class="chat-header__title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Chat
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="empty-state">
          <p class="text-sm text-muted">Nenhuma mensagem ainda. Comece a conversa!</p>
        </div>
      </div>

      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')enviarMsg()">
        <button onclick="enviarMsg()">Enviar</button>
      </div>
    </div>
  </div>

  <!-- Modal: senha do consultor (link sem senha na URL) -->
  <div class="modal-overlay" id="modalSenhaConsultor">
    <div class="modal">
      <h2>Acesso de consultor</h2>
      <p class="text-sm text-muted mb-2">Digite a senha de administrador desta sala. Ela não fica salva na barra de endereços.</p>
      <div class="form-group">
        <label for="inputSenhaConsultor">Senha</label>
        <input type="password" id="inputSenhaConsultor" placeholder="Senha da sala" autocomplete="current-password">
      </div>
      <div class="modal__actions">
        <button class="btn btn--secondary" id="btnCancelarConsultor" type="button">Cancelar</button>
        <button class="btn btn--primary" id="btnConfirmarConsultor" type="button">Entrar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/salas.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/documento.js"></script>
  <script>
    let salaAtual = null;
    let meuNome = localStorage.getItem('alinhapro_nome') || 'Visitante';
    let isAdmin = false;
    let salaIdGlobal = null;

    function atualizarNavSala() {
      const temToken = salaIdGlobal && !!getAdminToken(salaIdGlobal);
      const painel = document.getElementById('navPainel');
      const sairCons = document.getElementById('navSairConsultor');
      const sep = document.getElementById('navSepConsultor');
      painel.hidden = !temToken;
      sairCons.hidden = !temToken;
      sep.hidden = !temToken;
    }

    function fecharEditorSeAberto() {
      const docEditor = document.getElementById('docEditor');
      const docContent = document.getElementById('docContent');
      const btnEditar = document.getElementById('btnEditar');
      const btnSalvar = document.getElementById('btnSalvar');
      const btnCancelar = document.getElementById('btnCancelar');
      docEditor.classList.remove('doc-editor--active');
      docContent.classList.remove('doc-content--hidden');
      btnSalvar.style.display = 'none';
      btnCancelar.style.display = 'none';
      btnEditar.style.display = (salaIdGlobal && getAdminToken(salaIdGlobal)) ? '' : 'none';
    }

    function stripQueryParams(keys) {
      const u = new URL(window.location.href);
      keys.forEach(k => u.searchParams.delete(k));
      const qs = u.searchParams.toString();
      window.history.replaceState({}, '', u.pathname + (qs ? '?' + qs : '') + u.hash);
    }

    function mostrarUiAdmin() {
      isAdmin = true;
      meuNome = localStorage.getItem('alinhapro_admin_nome') || 'Consultor';
      localStorage.setItem('alinhapro_nome', meuNome);
      document.getElementById('btnEditar').style.display = '';
      atualizarNavSala();
    }

    function esconderUiAdmin() {
      isAdmin = false;
      document.getElementById('btnEditar').style.display = 'none';
      document.getElementById('btnSalvar').style.display = 'none';
      document.getElementById('btnCancelar').style.display = 'none';
      atualizarNavSala();
    }

    function abrirModalSenha() {
      document.getElementById('modalSenhaConsultor').classList.add('modal-overlay--active');
      document.getElementById('inputSenhaConsultor').value = '';
      document.getElementById('inputSenhaConsultor').focus();
    }

    function fecharModalSenha() {
      document.getElementById('modalSenhaConsultor').classList.remove('modal-overlay--active');
    }

    async function tentarLoginConsultor(senha) {
      const token = await adminLogin(salaIdGlobal, senha);
      if (!token) {
        showToast('Senha incorreta.');
        return false;
      }
      showToast('Sessão de consultor ativa (8 horas neste navegador).');
      fecharModalSenha();
      stripQueryParams(['admin', 'consultor']);
      mostrarUiAdmin();
      return true;
    }

    async function init() {
      const salaId = getParam('id');
      salaIdGlobal = salaId;
      const adminLegacy = getParam('admin');
      const modoConsultor = getParam('consultor') === '1';

      if (!salaId) {
        window.location.href = 'index.html';
        return;
      }

      document.addEventListener('alinhapro-admin-invalido', () => {
        fecharEditorSeAberto();
        esconderUiAdmin();
      });

      salaAtual = await buscarSala(salaId);
      if (!salaAtual) {
        showToast('Sala não encontrada');
        setTimeout(() => window.location.href = 'index.html', 1500);
        return;
      }

      isAdmin = !!getAdminToken(salaId);
      if (isAdmin) {
        mostrarUiAdmin();
      }

      if (adminLegacy) {
        const ok = await tentarLoginConsultor(adminLegacy);
        if (ok) isAdmin = true;
        else stripQueryParams(['admin']);
      } else if (modoConsultor && !getAdminToken(salaId)) {
        abrirModalSenha();
      }

      document.getElementById('btnConfirmarConsultor').onclick = async () => {
        const s = document.getElementById('inputSenhaConsultor').value;
        if (!s) {
          showToast('Digite a senha.');
          return;
        }
        const ok = await tentarLoginConsultor(s);
        if (ok) isAdmin = true;
      };

      document.getElementById('btnCancelarConsultor').onclick = () => {
        fecharModalSenha();
        stripQueryParams(['consultor']);
      };

      document.getElementById('inputSenhaConsultor').onkeydown = (e) => {
        if (e.key === 'Enter') document.getElementById('btnConfirmarConsultor').click();
      };

      const elNome = document.getElementById('salaNome');
      elNome.textContent = salaAtual.nome;
      elNome.title = salaAtual.nome;
      document.title = `AlinhaPro — ${salaAtual.nome}`;

      window.__docAtual = salaAtual.documento;
      document.getElementById('docContent').innerHTML = renderizarMarkdown(salaAtual.documento);

      iniciarEditor(salaId, isAdmin);

      const msgs = await carregarMensagens(salaId);
      const container = document.getElementById('chatMessages');
      if (msgs.length > 0) {
        container.innerHTML = '';
        msgs.forEach(m => container.appendChild(renderMensagem(m, meuNome)));
        scrollChatParaBaixo();
      }

      ouvirMensagens(salaId, (novaMensagem) => {
        const container = document.getElementById('chatMessages');
        const emptyState = container.querySelector('.empty-state');
        if (emptyState) emptyState.remove();
        container.appendChild(renderMensagem(novaMensagem, meuNome));
        scrollChatParaBaixo();
      });

      ouvirMudancasDocumento(salaId, (novoDoc) => {
        atualizarVisualizacao(novoDoc);
      });

      atualizarNavSala();

      document.getElementById('navSairConsultor').addEventListener('click', () => {
        if (!salaIdGlobal) return;
        fecharEditorSeAberto();
        limparSessaoConsultor(salaIdGlobal);
        esconderUiAdmin();
        showToast('Modo consultor encerrado. Você continua na sala como leitor.');
      });
    }

    async function enviarMsg() {
      const input = document.getElementById('chatInput');
      const texto = input.value.trim();
      if (!texto) return;

      input.value = '';
      await enviarMensagem(salaAtual.id, meuNome, texto);
    }

    const btnEditar = document.getElementById('btnEditar');
    const btnSalvar = document.getElementById('btnSalvar');
    const btnCancelar = document.getElementById('btnCancelar');

    btnEditar.addEventListener('click', () => {
      btnEditar.style.display = 'none';
      btnSalvar.style.display = '';
      btnCancelar.style.display = '';
    });

    btnCancelar.addEventListener('click', () => {
      btnEditar.style.display = '';
      btnSalvar.style.display = 'none';
      btnCancelar.style.display = 'none';
    });

    btnSalvar.addEventListener('click', () => {
      btnEditar.style.display = '';
      btnSalvar.style.display = 'none';
      btnCancelar.style.display = 'none';
    });

    init();
  </script>

</body>
</html>
